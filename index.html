<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHECKNI TO | OCR Testovací Modul</title>
    <style>
        :root {
            --bg-color: #faf9f6;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --success-hover: #15803d;
            --error: #dc2626;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 4px 0;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
            margin: 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .upload-section {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            background-color: #f8fafc;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .upload-section:hover {
            border-color: var(--primary);
        }

        .upload-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }

        .upload-btn:hover {
            background-color: var(--primary-hover);
        }

        input[type="file"] {
            display: none;
        }

        .progress-container {
            display: none;
            margin: 16px 0;
        }

        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .progress-bar-bg {
            background-color: #e2e8f0;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease;
        }

        .result-form {
            display: none;
            margin-top: 24px;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-weight: 500;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--text-color);
        }

        .submit-btn {
            background-color: var(--success);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 8px;
        }

        .submit-btn:hover {
            background-color: var(--success-hover);
        }

        .alert {
            display: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .gdpr-info {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 16px;
            line-height: 1.4;
        }
    </style>
    <!-- Načtení knihovny Tesseract.js přes CDN -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>CHECKNI TO</h1>
            <p>OCR Vytěžovací Modul</p>
        </div>

        <!-- Upozornění pro uživatele -->
        <div id="success-alert" class="alert alert-success"></div>
        <div id="error-alert" class="alert alert-error"></div>

        <!-- Sekce pro nahrání/vyfocení dokladu -->
        <div class="upload-section">
            <p style="font-size: 12px; color: var(--text-muted); margin: 0 0 16px 0; line-height: 1.5;">
                Vyfoťte zadní stranu občanského průkazu (MRZ kód) nebo přední stranu pro vytěžení jména.
            </p>
            <button class="upload-btn" onclick="document.getElementById('document-input').click()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;"><rect x="3" y="4" width="18" height="12" rx="2"/><circle cx="7.5" cy="9.5" r="1.5"/><line x1="12" y1="8" x2="17" y2="8"/><line x1="12" y1="11" x2="15" y2="11"/><path d="M7 16l3 3 8-8" stroke="#10b981" stroke-width="3"/></svg>
                Spustit fotoaparát
            </button>
            <!-- Skrytý input pro aktivaci nativní kamery -->
            <input type="file" id="document-input" accept="image/*" capture="environment">
        </div>

        <!-- Indikátor průběhu OCR -->
        <div id="progress-container" class="progress-container">
            <div class="progress-text">
                <span>Rozpoznávání textu...</span>
                <span id="progress-val">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- Výsledný formulář s editovatelnými daty -->
        <div id="result-form" class="result-form">
            <div class="form-group">
                <label for="jmeno-input">Jméno</label>
                <input type="text" id="jmeno-input" class="form-control" placeholder="Bude vytěženo...">
            </div>
            <div class="form-group">
                <label for="prijmeni-input">Příjmení</label>
                <input type="text" id="prijmeni-input" class="form-control" placeholder="Bude vytěženo...">
            </div>
            <button id="submit-btn" class="submit-btn">Potvrdit a uložit</button>
        </div>

        <div class="gdpr-info">
            <strong>GDPR ochrana:</strong> Snímky jsou zpracovány lokálně v prohlížeči. Obrazová data jsou po extrakci okamžitě zahozena a neodesílají se na síť.
        </div>
    </div>

    <!-- Integrace OCR.js pomocí ES modulu -->
    <script type="module">
        import { recognizeDocument, onConfirm } from './ocr.js';

        const fileInput = document.getElementById('document-input');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressVal = document.getElementById('progress-val');
        
        const resultForm = document.getElementById('result-form');
        const jmenoInput = document.getElementById('jmeno-input');
        const prijmeniInput = document.getElementById('prijmeni-input');
        const submitBtn = document.getElementById('submit-btn');

        const successAlert = document.getElementById('success-alert');
        const errorAlert = document.getElementById('error-alert');

        // Pomocné funkce pro skrytí a zobrazení upozornění
        function showAlert(alertEl, text) {
            alertEl.textContent = text;
            alertEl.style.display = 'block';
            setTimeout(() => { alertEl.style.display = 'none'; }, 6000);
        }

        function hideAlerts() {
            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';
        }

        // Reakce na pořízení fotky/nahrání dokladu
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            hideAlerts();
            resultForm.style.display = 'none';
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressVal.textContent = '0%';

            try {
                // Volání funkce recognizeDocument z ocr.js modulu
                const result = await recognizeDocument(file, (percent) => {
                    progressBar.style.width = `${percent}%`;
                    progressVal.textContent = `${percent}%`;
                });

                // Zobrazení a předvyplnění výsledků
                jmenoInput.value = result.jmeno;
                prijmeniInput.value = result.prijmeni;
                
                progressContainer.style.display = 'none';
                resultForm.style.display = 'block';

                if (result.jmeno || result.prijmeni) {
                    showAlert(successAlert, "Text byl úspěšně zpracován. Zkontrolujte prosím údaje.");
                } else {
                    showAlert(errorAlert, "Nepodařilo se automaticky načíst jména. Vyplňte je prosím ručně.");
                }
            } catch (err) {
                console.error(err);
                progressContainer.style.display = 'none';
                showAlert(errorAlert, "Chyba při vytěžování: " + err.message);
                // I při chybě zobrazíme formulář k ručnímu vyplnění
                jmenoInput.value = "";
                prijmeniInput.value = "";
                resultForm.style.display = 'block';
            } finally {
                // Vyčistíme file input
                fileInput.value = '';
            }
        });

        // Odeslání potvrzených dat na backend přes onConfirm callback
        submitBtn.addEventListener('click', async () => {
            const jmeno = jmenoInput.value.trim();
            const prijmeni = prijmeniInput.value.trim();

            if (!jmeno || !prijmeni) {
                showAlert(errorAlert, "Jméno a příjmení jsou povinné údaje.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Ukládám...";

            try {
                // Volání onConfirm callbacku, který provede fetch na backend
                await onConfirm({ jmeno, prijmeni });
                
                showAlert(successAlert, `Návštěvník ${jmeno} ${prijmeni} byl úspěšně uložen do databáze.`);
                resultForm.style.display = 'none';
                jmenoInput.value = '';
                prijmeniInput.value = '';
            } catch (err) {
                console.error(err);
                showAlert(errorAlert, "Uložení selhalo: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Potvrdit a uložit";
            }
        });
    </script>
</body>
</html>
